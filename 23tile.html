<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23Tile - Sliding Puzzle Game</title>
    <link rel="stylesheet" href="23tile.css">
</head>
<body>
    <div class="container">
        <h1>23Tile Puzzle</h1>
        <div class="game-info">
            <p>Arrange the tiles in order from 1 to 23!</p>
            <div class="controls">
                <button id="shuffle-btn" class="btn">Shuffle</button>
                <button id="reset-btn" class="btn">Reset</button>
            </div>
            <div class="stats">
                <span>Moves: <span id="moves">0</span></span>
            </div>
        </div>
        <div id="game-board" class="game-board"></div>
        <div id="win-message" class="win-message hidden">
            <h2>🎉 Congratulations! 🎉</h2>
            <p>You solved the puzzle in <span id="final-moves"></span> moves!</p>
            <button id="play-again-btn" class="btn">Play Again</button>
        </div>
    </div>
    <script src="23tile.js"></script>
</body>
</html>
